<body>
    <div class="aesthetic-box">
        <button class="btn-vintage" id="trigger-profile">
            Ver perfil
        </button>
    </div>

    <dialog class="modal-vintage" id="player-modal">
        <div class="modal-base profile-layout">
            <div class="profile-banner">
                <img src="https://images.unsplash.com/photo-1544148103-0773bf10d330?q=80&w=800&auto=format&fit=crop"
                    alt="Background">
                <div class="banner-overlay"></div>
                <button class="modal-close-btn" id="close-profile-btn">&times;</button>
            </div>

            <div class="profile-content">
                <div class="profile-header">
                    <div class="avatar-box">
                        <span class="avatar-icon">⚡</span>
                    </div>
                    <div class="header-text">
                        <h2 class="user-name">DEV_USER_01</h2>
                        <p class="user-role">FULLSTACK_ENGINEER</p>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">EXP</span>
                        <span class="stat-value">2 YRS</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">LVL</span>
                        <span class="stat-value">B2_ENG</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">STATUS</span>
                        <span class="stat-value">REMOTE</span>
                    </div>
                </div>

                <div class="bio-section">
                    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut
                        labore et dolore magna aliqua. Ut enim ad minim veniam.</p>
                </div>

                <div class="tech-tags">
                    <span>REACT</span>
                    <span>.NET</span>
                    <span>AZURE</span>
                    <span>TYPESCRIPT</span>
                </div>
            </div>
        </div>
    </dialog>
