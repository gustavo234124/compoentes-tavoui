<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TavoUI - Christmas Textarea</title>
    <link rel="stylesheet" href="textArea.css">
</head>

<body>

    <div class="santa-container">
        <h3 class="santa-title">Querido Santa...</h3>
        <p class="santa-subtitle">Escribe tus deseos con cuidado, los elfos están leyendo.</p>

        <textarea class="christmas-textarea" id="santa-letter"
            placeholder="Este año me he portado muy bien, programé componentes limpios..." maxlength="500"></textarea>

        <div class="counter-text" id="letter-counter">0 / 500 caracteres</div>
    </div>

    <script src="textArea.js"></script>

</body>

</html>
