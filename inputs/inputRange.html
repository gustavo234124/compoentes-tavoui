<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TavoUI - Volume Range</title>
    <link rel="stylesheet" href="inputRange.css">

</head>

<body>

    <div class="volume-container">
        <div class="volume-icon" id="volume-icon-container">
            <svg id="icon-audio" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path id="wave-1" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                <path id="wave-2" d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            </svg>
        </div>

        <input type="range" min="0" max="100" value="50" class="tavo-range" id="volume-slider"
            aria-label="Control de volumen" />

        <span class="volume-text" id="volume-value">50%</span>
    </div>

    <script src="inputRange.js"></script>
</body>

</html>
