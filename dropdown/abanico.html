<body>
    <div class="tavo-radar-dropdown top-left">

            <span class="radar-icon">+</span>
        </label>

        <ul class="radar-menu">
            <li style="--i:1; --x: 80px; --y: 0px;">
                <a href="#perfil" class="radar-item" title="Perfil">👤</a>
            </li>
            <li style="--i:2; --x: 56px; --y: 56px;">
                <a href="#ajustes" class="radar-item" title="Ajustes">⚙️</a>
            </li>
            <li style="--i:3; --x: 0px; --y: 80px;">
                <a href="#notificaciones" class="radar-item" title="Alertas">🔔</a>
            </li>
        </ul>
    </div>
</body>

</html>
