<div class="tavo-piano-dropdown">
    <input type="checkbox" id="piano-toggle" class="piano-gate">
    <label for="piano-toggle" class="piano-btn">Piano Menu</label>

    <ul class="piano-keys">
        <li style="--i:1" class="key white"><span>DO</span></li>
        <li style="--i:2" class="key black"><span>DO#</span></li>
        <li style="--i:3" class="key white"><span>RE</span></li>
        <li style="--i:4" class="key black"><span>RE#</span></li>
        <li style="--i:5" class="key white"><span>MI</span></li>
        <li style="--i:6" class="key white"><span>FA</span></li>
        <li style="--i:7" class="key black"><span>FA#</span></li>
        <li style="--i:8" class="key white"><span>SOL</span></li>

    </ul>
</div>
